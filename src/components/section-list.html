<section class="rounded-lg border border-emerald-200 bg-white p-4 shadow-sm">
  <div class="font-semibold text-emerald-800">
    {{if isChanging}}
    <input
      value="{{=sectionTitle}}"
      @input="updateTitle()"
      placeholder="Section Title"
      class="w-full max-w-xs rounded-md border border-emerald-200 px-2 py-1 text-sm font-semibold focus:border-emerald-400 focus:outline-none"
    />
    {{else}} {{=sectionTitle}} {{/if}}
  </div>
  <div class="my-1 h-px bg-emerald-100"></div>
  {{if isChanging}}
  <ul class="mt-2 space-y-2">
    <li class="grid gap-2 sm:grid-cols-[1fr_auto]">
      <textarea
        placeholder="New item..."
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      ></textarea>
      <button
        @click="addItem()"
        class="rounded-md bg-emerald-600 px-3 py-1 text-sm text-white hover:bg-emerald-700 sm:w-20"
      >
        Add
      </button>
    </li>
    {{forOf items as item idx}}
    <li class="grid gap-2 sm:grid-cols-[1fr_auto]">
      <textarea
        data-idx="{{=idx}}"
        @input="updateListItem()"
        placeholder="content"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      >{{=item}}</textarea>
      <button
        data-idx="{{=idx}}"
        @click="removeItem()"
        class="rounded-md border border-red-200 px-3 py-1 text-sm text-red-600 hover:bg-red-50 sm:w-20"
      >
        Remove
      </button>
    </li>
    {{/forOf}}
  </ul>
  {{else}}
  <ul class="mt-2 ml-5 list-disc space-y-1 text-sm text-gray-800">
    {{forOf items as item}}
    <li>{{=item}}</li>
    {{/forOf}}
  </ul>
  {{/if}}
</section>
