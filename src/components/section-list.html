<section class="rounded-lg border border-emerald-200 bg-white p-5 shadow-sm">
  <div class="font-semibold text-emerald-800">
    {{if isChanging}}
    <input
      value="{{=sectionTitle}}"
      v-change="updateTitle()"
      placeholder="Section Title"
      class="w-full max-w-xs rounded-md border border-emerald-200 px-2 py-1 text-sm font-semibold focus:border-emerald-400 focus:outline-none"
    />
    {{else}} {{=sectionTitle}} {{/if}}
  </div>
  <div class="my-0 h-px bg-emerald-200"></div>
  {{if isChanging}}
  <ul class="mt-3 space-y-2">
    <li class="grid gap-2 sm:grid-cols-[1fr_auto]">
      <textarea
        placeholder="newItem"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      ></textarea>
      <button
        v-click="addItem()"
        class="rounded-md bg-emerald-600 px-3 py-1 text-sm text-white hover:bg-emerald-700 sm:w-24"
      >
        add
      </button>
    </li>
    {{each items as item idx}}
    <li class="grid gap-2 sm:grid-cols-[1fr_auto]">
      <textarea
        data-idx="{{=idx}}"
        v-change="updateListItem()"
        placeholder="content"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      >
{{=item}}</textarea
      >
      <button
        data-idx="{{=idx}}"
        v-click="removeItem()"
        class="rounded-md border border-emerald-300 px-3 py-1 text-sm text-emerald-700 hover:bg-emerald-50 sm:w-24"
      >
        remove
      </button>
    </li>
    {{/each}}
  </ul>
  {{else}}
  <ul class="mt-3 ml-5 list-disc space-y-1 text-sm text-gray-800">
    {{each items as item}}
    <li>{{=item}}</li>
    {{/each}}
  </ul>
  {{/if}}
</section>
