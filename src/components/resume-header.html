{{if isChanging}}
<div class="rounded-lg border border-emerald-200 bg-white p-4 shadow-sm">
  <div class="flex flex-wrap items-center justify-between gap-2">
    <div class="tooltip tooltip-bottom" data-tip="Click to save and exit">
      <span
        class="cursor-pointer rounded-md bg-emerald-600 px-2.5 py-1 text-xs font-medium text-white transition-colors hover:bg-emerald-700"
        @click="toggleEdit()"
      >
        Edit Mode
      </span>
    </div>
    <button
      class="rounded-md border border-red-200 px-2.5 py-1 text-xs text-red-600 transition-colors hover:bg-red-50"
      @click="clearStorage()"
    >
      Clear localStorage
    </button>
  </div>
  <div class="my-2 h-px bg-emerald-100"></div>
  <div class="grid gap-3 md:grid-cols-2">
    <label class="flex flex-col gap-1">
      <span class="text-xs font-medium text-emerald-700/70">Name</span>
      <input
        type="text"
        value="{{=name}}"
        data-field="name"
        @input="updateField()"
        placeholder="Your name"
        class="rounded-md border border-emerald-200 px-2 py-1 text-sm transition-colors focus:border-emerald-400 focus:outline-none"
      />
    </label>
    <label class="flex flex-col gap-1">
      <span class="text-xs font-medium text-emerald-700/70">Info</span>
      <input
        type="text"
        value="{{=myInfo}}"
        data-field="myInfo"
        @input="updateField()"
        placeholder="Gender, age, education, expected job"
        class="rounded-md border border-emerald-200 px-2 py-1 text-sm transition-colors focus:border-emerald-400 focus:outline-none"
      />
    </label>
  </div>
  <div class="mt-3 grid gap-3 md:grid-cols-3">
    <label class="flex flex-col gap-1">
      <span class="text-xs font-medium text-emerald-700/70">Tel</span>
      <input
        type="text"
        value="{{=tel}}"
        data-field="tel"
        @input="updateField()"
        class="rounded-md border border-emerald-200 px-2 py-1 text-sm transition-colors focus:border-emerald-400 focus:outline-none"
      />
    </label>
    <label class="flex flex-col gap-1">
      <span class="text-xs font-medium text-emerald-700/70">Email</span>
      <input
        type="text"
        value="{{=email}}"
        data-field="email"
        @input="updateField()"
        class="rounded-md border border-emerald-200 px-2 py-1 text-sm transition-colors focus:border-emerald-400 focus:outline-none"
      />
    </label>
    <label class="flex flex-col gap-1">
      <span class="text-xs font-medium text-emerald-700/70">GitHub</span>
      <input
        type="text"
        value="{{=github}}"
        data-field="github"
        @input="updateField()"
        class="rounded-md border border-emerald-200 px-2 py-1 text-sm transition-colors focus:border-emerald-400 focus:outline-none"
      />
    </label>
  </div>
</div>
{{else}}
<div class="rounded-lg border border-emerald-200 bg-white p-4 shadow-sm">
  <div class="flex flex-wrap items-center gap-2">
    <div
      class="tooltip tooltip-bottom"
      data-tip="Right-click to edit"
      @contextmenu="toggleEdit()"
    >
      <h1
        class="cursor-pointer text-2xl font-bold text-gray-800 transition-colors hover:text-emerald-700"
      >
        {{=name}}
      </h1>
    </div>
  </div>
  <p class="mt-1 text-sm text-gray-500">{{=myInfo}}</p>
  <div class="mt-2 flex flex-wrap gap-3 text-sm">
    <div class="flex items-center gap-1.5">
      <span
        class="rounded-md bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700"
        >Tel</span
      >
      <a href="tel:{{=tel}}" class="text-emerald-600 hover:text-emerald-700"
        >{{=tel}}</a
      >
    </div>
    <div class="flex items-center gap-1.5">
      <span
        class="rounded-md bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700"
        >Email</span
      >
      <a
        href="mailto:{{=email}}"
        class="text-emerald-600 hover:text-emerald-700"
        >{{=email}}</a
      >
    </div>
    <div class="flex items-center gap-1.5">
      <span
        class="rounded-md bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700"
        >Github</span
      >
      <a
        href="https://github.com/{{=github}}"
        class="text-emerald-600 hover:text-emerald-700"
        target="_blank"
        rel="noopener"
        >https://github.com/{{=github}}</a
      >
    </div>
  </div>
</div>
{{/if}}
