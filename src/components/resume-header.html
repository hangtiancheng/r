{{if isChanging}}
<div class="rounded-lg border border-emerald-200 bg-white p-5 shadow-sm">
  <div class="flex flex-wrap items-center justify-between gap-2">
    <span
      class="cursor-pointer rounded-md bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700"
      s-lark-ev="toggle-edit"
      s-lark-msg="点击切换预览模式"
      s-lark-toggle="edit -> preview"
      @click="toggleEdit()"
      >Edit Mode</span
    >
    <button
      class="rounded-md border border-emerald-300 px-3 py-1 text-sm text-emerald-700 hover:bg-emerald-50"
      s-lark-ev="clear-local-storage"
      s-lark-msg="清空本地存储"
      @click="clearStorage()"
    >
      Clear localStorage
    </button>
  </div>
  <div class="mt-3 grid gap-3 md:grid-cols-2">
    <label class="flex flex-col gap-1.5">
      <span class="text-sm font-medium text-gray-500">姓名</span>
      <input
        value="{{=name}}"
        data-field="name"
        @change="updateField()"
        placeholder="Input your name"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
    </label>
    <label class="flex flex-col gap-1.5">
      <span class="text-sm font-medium text-gray-500">基本信息</span>
      <input
        value="{{=myInfo}}"
        data-field="myInfo"
        @change="updateField()"
        placeholder="Input your gender, age, education, expected job"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
    </label>
  </div>
  <div class="mt-3 grid gap-3 md:grid-cols-3">
    <label class="flex flex-col gap-1.5">
      <span class="text-sm font-medium text-gray-500">Tel</span>
      <input
        value="{{=tel}}"
        data-field="tel"
        @change="updateField()"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
    </label>
    <label class="flex flex-col gap-1.5">
      <span class="text-sm font-medium text-gray-500">Email</span>
      <input
        value="{{=email}}"
        data-field="email"
        @change="updateField()"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
    </label>
    <label class="flex flex-col gap-1.5">
      <span class="text-sm font-medium text-gray-500">GitHub</span>
      <input
        value="{{=github}}"
        data-field="github"
        @change="updateField()"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
    </label>
  </div>
</div>
{{else}}
<div class="rounded-lg border border-emerald-200 bg-white p-5 shadow-sm">
  <div
    class="flex flex-wrap items-center gap-2"
    s-lark-ev="toggle-edit"
    s-lark-msg="右键点击切换编辑模式"
    s-lark-toggle="preview -> edit"
    @contextmenu="toggleEdit()"
  >
    <h1 class="cursor-pointer text-2xl font-bold text-gray-800">{{=name}}</h1>
  </div>
  <p class="mt-2 text-gray-500">{{=myInfo}}</p>
  <div class="mt-3 flex flex-wrap gap-3 text-sm">
    <div class="flex items-center gap-1.5">
      <span
        class="rounded-md bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700"
        >Tel</span
      >
      <a href="tel:{{=tel}}" class="text-emerald-600 hover:text-emerald-700"
        >{{=tel}}</a
      >
    </div>
    <div class="flex items-center gap-1.5">
      <span
        class="rounded-md bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700"
        >Email</span
      >
      <a
        href="mailto:{{=email}}"
        class="text-emerald-600 hover:text-emerald-700"
        >{{=email}}</a
      >
    </div>
    <div class="flex items-center gap-1.5">
      <span
        class="rounded-md bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700"
        >Github</span
      >
      <a
        href="https://github.com/{{=github}}"
        class="text-emerald-600 hover:text-emerald-700"
        target="_blank"
        rel="noopener"
        >https://github.com/{{=github}}</a
      >
    </div>
  </div>
</div>
{{/if}}
