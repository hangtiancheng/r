<section class="rounded-lg border border-emerald-200 bg-white p-4 shadow-sm">
  <div class="font-semibold text-emerald-800">
    {{if isChanging}}
    <input
      value="{{=sectionTitle}}"
      @input="updateField()"
      placeholder="Education Experience"
      class="w-full max-w-xs rounded-md border border-emerald-200 px-2 py-1 text-sm font-semibold focus:border-emerald-400 focus:outline-none"
    />
    {{else}} {{=sectionTitle}} {{/if}}
  </div>
  <div class="my-1 h-px bg-emerald-100"></div>
  {{if isChanging}}
  <ul class="mt-2 space-y-2">
    {{forOf eduList as edu idx}}
    <li class="grid items-start gap-2 md:grid-cols-[1.1fr_1.6fr_1fr_auto]">
      <input
        value="{{=edu[0]}}"
        data-idx="{{=idx}}"
        data-col="0"
        @input="updateEdu()"
        placeholder="Period"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
      <input
        value="{{=edu[1]}}"
        data-idx="{{=idx}}"
        data-col="1"
        @input="updateEdu()"
        placeholder="University"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
      <input
        value="{{=edu[2]}}"
        data-idx="{{=idx}}"
        data-col="2"
        @input="updateEdu()"
        placeholder="Major"
        class="w-full rounded-md border border-emerald-200 px-2 py-1 text-sm focus:border-emerald-400 focus:outline-none"
      />
      <button
        data-idx="{{=idx}}"
        @click="clearEdu()"
        class="w-full rounded-md border border-orange-200 px-3 py-1 text-sm text-orange-600 hover:bg-orange-50 md:w-20"
      >
        Clear
      </button>
    </li>
    {{/forOf}}
  </ul>
  {{else}}
  <ul class="mt-2 space-y-1 text-sm">
    {{forOf eduList as edu}}
    <li class="grid gap-1.5 md:grid-cols-3">
      <div class="text-gray-800">{{=edu[0]}}</div>
      <div class="text-gray-800">{{=edu[1]}}</div>
      <div class="text-gray-800">{{=edu[2]}}</div>
    </li>
    {{/forOf}}
  </ul>
  {{/if}}
</section>
